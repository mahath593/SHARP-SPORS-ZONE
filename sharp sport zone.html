<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharp Sports Zone | Shop & Cart</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0070f3; --dark: #050505; --glass: rgba(255,255,255,0.06); --wa: #25D366; --danger: #ff4d4d; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        body { background: var(--dark); color: #fff; line-height: 1.6; padding-bottom: 140px; }

        /* --- NAVIGATION --- */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 2000; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            padding: 15px 5%; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid #222; 
        }
        .nav-links { display: flex; gap: 15px; overflow-x: auto; white-space: nowrap; padding-left: 10px; }
        .nav-links::-webkit-scrollbar { display: none; } /* Hide scrollbar for mobile cleanliness */
        .nav-links a { text-decoration: none; color: #888; font-size: 0.75rem; font-weight: 800; cursor: pointer; }
        .nav-links a.active { color: var(--primary); }

        /* --- LANDING PAGE (HERO) --- */
        .hero {
            height: 90vh; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1500');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 0 10%;
        }
        .hero h1 { font-size: clamp(2rem, 10vw, 4.5rem); font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        .hero p { max-width: 600px; color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }
        .hero-btn { 
            padding: 12px 30px; background: var(--primary); color: white; 
            text-decoration: none; border-radius: 50px; font-weight: 800; transition: 0.3s;
        }

        /* --- GRID (Mobile Responsive) --- */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); /* Default 1 column for mobile */
            gap: 15px; 
            padding: 40px 5%; 
        }
        
        /* Tablet/Desktop Grid */
        @media (min-width: 600px) {
            .grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        }

        .card { background: var(--glass); border: 1px solid #222; border-radius: 20px; padding: 20px; position: relative; }
        .price { font-size: 1.4rem; font-weight: 800; margin: 10px 0; color: var(--primary); }
        
        .qty-box { display: flex; align-items: center; gap: 10px; margin: 15px 0; }
        .qty-btn { background: #333; color: white; border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .add-cart-btn { flex: 1; background: #fff; color: #000; border: none; padding: 10px; border-radius: 8px; font-weight: 800; cursor: pointer; height: 35px; }

        /* --- FLOATING CART BAR (Mobile Responsive) --- */
        .cart-bar { 
            position: fixed; bottom: 0; left: 0; right: 0; 
            background: #111; border-top: 2px solid var(--primary); 
            padding: 15px 5%; display: flex; flex-direction: row; 
            justify-content: space-between; align-items: center; 
            z-index: 2000; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); 
        }
        .cart-info h4 { font-size: 1.1rem; color: #fff; }
        .checkout-btn { 
            background: var(--wa); color: white; padding: 10px 20px; 
            border-radius: 30px; text-decoration: none; font-weight: 800; 
            font-size: 0.85rem; display: flex; align-items: center; gap: 8px; 
        }

        /* --- ADMIN MODAL --- */
        #admin-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000; align-items: center; justify-content: center; }
        .admin-box { background: #111; width: 90%; max-width: 400px; padding: 25px; border-radius: 20px; border: 1px solid var(--primary); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #222; border: 1px solid #333; color: white; border-radius: 8px; font-size: 16px; } /* 16px prevents iOS zoom on focus */

        .admin-trigger { position: fixed; top: 18px; right: 15px; color: #333; cursor: pointer; z-index: 2001; font-size: 1.2rem; }

        /* --- SMALL DEVICE TWEAKS --- */
        @media (max-width: 400px) {
            nav div:first-child { font-size: 0.8rem; }
            .cart-info h4 { font-size: 0.9rem; }
            .checkout-btn { padding: 8px 15px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 900; cursor: pointer;" onclick="window.scrollTo(0,0)">SHARP SPORT ZONE</div>
        <div class="nav-links">
            <a onclick="setCat('All')" id="l-all" class="active">ALL</a>
            <a onclick="setCat('Indoor')" id="l-indoor">INDOOR</a>
            <a onclick="setCat('Outdoor')" id="l-outdoor">OUTDOOR</a>
        </div>
    </nav>

    <i class="fas fa-cog admin-trigger" onclick="openAdmin()"></i>

    <section class="hero">
        <p style="color:var(--primary); font-weight:800; letter-spacing:4px; font-size: 0.7rem;">PREMIUM GEAR</p>
        <h1>WIN THE <span style="color:var(--primary)">GAME.</span></h1>
        <p>Your one-stop shop for professional sports equipment.</p>
        <a href="#store-start" class="hero-btn">SHOP NOW</a>
    </section>

    <div id="store-start" style="height: 1px;"></div>
    <div class="grid" id="product-grid"></div>

    <div class="cart-bar" id="cart-bar" style="display: none;">
        <div class="cart-info">
            <p id="item-count" style="font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: 700;"></p>
            <h4 id="total-price">Total: ₹0</h4>
        </div>
        <a href="javascript:void(0)" class="checkout-btn" onclick="sendWhatsAppOrder()">
            <i class="fab fa-whatsapp"></i> ORDER
        </a>
    </div>

    <div id="admin-modal">
        <div class="admin-box">
            <h3 style="margin-bottom: 15px; color: var(--primary);">Add New Product</h3>
            <input type="text" id="adm-name" placeholder="Item Name">
            <input type="number" id="adm-price" placeholder="Price">
            <select id="adm-cat">
                <option value="Indoor">Indoor</option>
                <option value="Outdoor">Outdoor</option>
            </select>
            <button onclick="saveProduct()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; font-weight:800; cursor:pointer;">SAVE PRODUCT</button>
            <button onclick="closeAdmin()" style="width:100%; padding:10px; margin-top:10px; background:transparent; color:#555; border:none; width:100%;">Cancel</button>
        </div>
    </div>

    <script>
        // Logic remains identical to previous version
        let products = JSON.parse(localStorage.getItem('ssz_items')) || [
            { id: 1, name: "English Willow Bat", p: 5500, cat: "Outdoor" },
            { id: 2, name: "Fiberglass Surfboard", p: 18500, cat: "Outdoor" },
            { id: 3, name: "Recurve Archery Bow", p: 7200, cat: "Outdoor" },
            { id: 4, name: "Match Grade Football", p: 1200, cat: "Outdoor" },
            { id: 5, name: "Football Cleats", p: 2400, cat: "Outdoor" },
            { id: 6, name: "Tennis Racket (Pro)", p: 4800, cat: "Outdoor" },
            { id: 7, name: "Kashmiri Willow Bat", p: 2500, cat: "Outdoor" },
            { id: 8, name: "Champion Carrom Board", p: 3200, cat: "Indoor" },
            { id: 9, name: "Yonex Arcsaber Racket", p: 2400, cat: "Indoor" },
            { id: 10, name: "Heavy Boxing Bag", p: 3800, cat: "Indoor" },
            { id: 11, name: "Tournament Chess Set", p: 850, cat: "Indoor" },
            { id: 12, name: "Table Tennis Set", p: 1100, cat: "Indoor" },
            { id: 13, name: "Professional Ice Skates", p: 5500, cat: "Indoor" },
            { id: 14, name: "Premium Swim Gear Kit", p: 1450, cat: "Outdoor" },
            { id: 15, name: "Dumbbell Set", p: 3800, cat: "Indoor" }
        ];

        let cart = {};
        let currentCat = 'All';

        function updateQty(id, delta) {
            if (!cart[id]) cart[id] = 0;
            cart[id] += delta;
            if (cart[id] <= 0) delete cart[id];
            render();
            updateCartBar();
        }

        function updateCartBar() {
            const bar = document.getElementById('cart-bar');
            let totalItems = 0;
            let grandTotal = 0;
            for (let id in cart) {
                const item = products.find(p => p.id == id);
                if (item) {
                    totalItems += cart[id];
                    grandTotal += (item.p * cart[id]);
                }
            }
            if (totalItems > 0) {
                bar.style.display = 'flex';
                document.getElementById('item-count').innerText = `${totalItems} items`;
                document.getElementById('total-price').innerText = `Total: ₹${grandTotal.toLocaleString()}`;
            } else { bar.style.display = 'none'; }
        }

        function sendWhatsAppOrder() {
            let message = "🔥 *NEW ORDER - SHARP SPORTS ZONE* 🔥\n\n";
            let total = 0;
            for (let id in cart) {
                const item = products.find(p => p.id == id);
                if(item) {
                    message += `▪️ ${item.name} x ${cart[id]} = ₹${(item.p * cart[id]).toLocaleString()}\n`;
                    total += (item.p * cart[id]);
                }
            }
            message += `\n💰 *GRAND TOTAL: ₹${total.toLocaleString()}*`;
            const url = `https://wa.me/919940330294?text=${encodeURIComponent(message)}`;
            window.open(url, '_blank');
        }

        function openAdmin() { if(prompt("Key:") === "sharp77") document.getElementById('admin-modal').style.display = 'flex'; }
        function closeAdmin() { document.getElementById('admin-modal').style.display = 'none'; }
        
        function saveProduct() {
            const name = document.getElementById('adm-name').value;
            const price = parseInt(document.getElementById('adm-price').value);
            const cat = document.getElementById('adm-cat').value;
            if (name && price) {
                products.push({ id: Date.now(), name, p: price, cat });
                localStorage.setItem('ssz_items', JSON.stringify(products));
                render();
                closeAdmin();
            }
        }

        function deleteItem(id) {
            if(confirm("Delete product?")) {
                products = products.filter(p => p.id !== id);
                localStorage.setItem('ssz_items', JSON.stringify(products));
                render();
            }
        }

        function setCat(c) {
            currentCat = c;
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById(`l-${c.toLowerCase()}`).classList.add('active');
            document.getElementById('store-start').scrollIntoView({ behavior: 'smooth' });
            render();
        }

        function render() {
            const grid = document.getElementById('product-grid');
            const filtered = products.filter(p => currentCat === 'All' || p.cat === currentCat);
            grid.innerHTML = filtered.map(p => {
                const q = cart[p.id] || 0;
                return `
                <div class="card">
                    <small style="color:var(--primary); font-weight:800;">${p.cat}</small>
                    <h3>${p.name}</h3>
                    <div class="price">₹${parseInt(p.p).toLocaleString()}</div>
                    <div class="qty-box">
                        <button class="qty-btn" onclick="updateQty(${p.id}, -1)">-</button>
                        <span style="font-weight:800; width: 25px; text-align: center;">${q}</span>
                        <button class="qty-btn" onclick="updateQty(${p.id}, 1)">+</button>
                        <button class="add-cart-btn" onclick="updateQty(${p.id}, 1)">ADD</button>
                    </div>
                    <button onclick="deleteItem(${p.id})" style="background:transparent; color:#333; border:none; font-size:0.6rem;">Delete</button>
                </div>
            `}).join('');
        }
        window.onload = render;
    </script>
</body>
</html>
